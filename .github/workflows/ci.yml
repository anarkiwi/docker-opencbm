name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  IMAGE: anarkiwi/opencbm

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: opencbm:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          docker run --rm opencbm:test cbmctrl --help
          docker run --rm opencbm:test grep -qx 'default=xum1541' /etc/opencbm.conf
          docker run --rm opencbm:test ldd /usr/local/lib/opencbm/plugin/libopencbm-xum1541.so | grep -q libusb-1.0

  push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Check Docker Hub credentials
        id: creds
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::DOCKER_USERNAME/DOCKER_TOKEN secrets not set; skipping push."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.creds.outputs.present == 'true'
        uses: docker/setup-qemu-action@v4
      - if: steps.creds.outputs.present == 'true'
        uses: docker/setup-buildx-action@v4
      - if: steps.creds.outputs.present == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - if: steps.creds.outputs.present == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - if: steps.creds.outputs.present == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
